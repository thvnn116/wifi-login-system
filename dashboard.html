<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Employee Dashboard</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
padding-top:50px;
}

.card{
width:400px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:12px;
margin-top:20px;
background:#1e73d8;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2 id="empName">Tên nhân viên</h2>

<p><b>Chức danh:</b> <span id="empRole"></span></p>
<p><b>Bộ phận:</b> <span id="empDept"></span></p>
<p><b>Ca làm:</b> <span id="empShift"></span></p>

<button id="checkinBtn" onclick="checkin()">Chấm Công</button>

</div>
<button onclick="logout()" class="logoutBtn">Đăng xuất</button>

<script src="dashboard.js"></script>

</body>
</html>
